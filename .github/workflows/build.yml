name: Build

on: [push]

jobs:
  build:
    name: Swift ${{ matrix.swift }} on ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        swift: ["5.10"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift }}
      
      - name: Build (Release)
        run: swift build -c release
      
      - name: Verify build
        run: |
          if [ ! -f .build/release/Caliper ]; then
            echo "Error: Caliper binary not found"
            exit 1
          fi
      
      - name: Run help command
        run: .build/release/Caliper --help
      
      - name: Show version
        run: .build/release/Caliper --version
